# ── v0.0.5 S9 で判明: 証拠の「自動生成」がプラットフォームに未実装だった(US-04 debt)──
# ★descope 撤回: 当初これを v0.0.6 へ carried したが、ユーザー指摘どおり US-04 AC
# 「視覚/動作証拠の自動生成を毎 step 自動実行する」= プラットフォーム自身が毎 step
# ちゃんとした live 証拠を残す は v0.0.5 スコープそのもの。手動スクリプト + carried で
# 逃がしたのは descope。v0.0.5 で実装する(下記 done エントリ参照)。
- id: PLATFORM-auto-evidence-production
  origin: v0.0.5/us-04 AC + ユーザー指摘「ちゃんとした live 証拠を残すのが v0.0.5 スコープでは?」
  decision: >
    プラットフォームの live 実行が、技術 step 完了時に実 backend を縦に通したログ + 実 verify-ui
    screenshot を自動で _evidence/<version>/<step>/manifest.json に書き出す(US-04「毎 step 自動」)。
    これまでは generate-evidence.ts という手動スクリプトしかなく、自走では証拠が残らず gate が
    永久ブロック or 手動 manifest 頼みだった = 「ちゃんとした live 証拠」になっていなかった。
  state: done
  closed_in: >
    v0.0.5/s9/live-gate/auto-production/(実 claude live 検証済)。live orchestrator(src/infra/
    orchestrator/live.ts writeStepEvidence)が技術 step 完了時に実 stdout(run.log)+ 実 verify-ui
    screenshot(shot.png)から _evidence/<version>/<step>/manifest.json を自動書き出し。実 claude で
    S1 を走らせ、プラットフォームが手動スクリプト無しで manifest を生成 → ゲート通過 → review 起票を確認
    (証拠なし時は stalled = 別途実証済)。新規 src/infra/orchestrator/auto-evidence.test.ts(3)+ 750 pass。

# ── 独立 auditor "エージェント" のプラットフォーム組み込みは多エージェント基盤ゆえ v0.0.6 ──
- id: PLATFORM-evidence-separation-and-stance
  origin: v0.0.5/s9-validation.md (ユーザー指摘「記録者とレビュアーの分離 / どういうスタンスで証拠を作るべきかがプラットフォームに組み込まれてる?」)
  decision: >
    本サイクルで確立した 2 点を「プラットフォーム本体(src)が強制する」レベルまで組み込む:
    (1) 証拠の記録者(producer)≠レビュアー(checker)を別 run/agent として自走に組み込み、S9/S10 の証拠を
        独立に監査してから人間ゲートに出す(現状は私が手で subagent を起動しただけ=コード未実装)。
    (2) 証拠を作るスタンス(user-facing / 内部語禁止 / 自己 descope 禁止 / 非コード人を説得)を
        テキスト注入頼みでなく構造で効かせる(現状は kit テキストを prompt 注入するだけ=AI 遵守頼み、
        v0.0.5 S9 で私自身が破った=テキストだけでは不十分の実証)。
    例: 評価者 run を「証拠監査ロール」に拡張し、user-facing 性の自己点検を出力契約に課す等。
  state: done
  closed_in: >
    v0.0.5/s12-improvement.md (D-02) — S12 監査にて done 確定。
    【実装済(コード + 決定論検証)】cycle-service.generatorRoleFor を verification OR
    requiresLiveEvidence で generator 化 → 技術 step は「作る run(generator)≠ 監査する run
    (evaluator)」が別 run として spawn される。S7/S8/S9 既定に verification(LIVE_EVIDENCE_
    OBSERVATIONS = user-facing スタンス)付与。prompt-composer の evaluator に EVALUATOR_AUDITOR_
    STANCE(独立レビュア / 非コード人を説得 / Rule C-3)注入。決定論テスト
    (gen-gate-eval.test「requiresLiveEvidence WITHOUT verification → SEPARATE evaluator run」)で
    generator.id≠evaluator.id を実証。751 pass。
    【live 端到達 確認済】US-01 PASS 経路 live 実証(runId 2906b197… / dossier s9/live-pass/)にて
    engine-service が generatorRoleFor → generator run を spawn し evaluator run を別 runId で
    起動して S9 が done まで通ったことを確認(S9-run.log 132KB / S9-manifest.json に連鎖記録)。
    S12 タスク仕様「US-01 PASS 経路 live 実証で gen→eval が実走したので evaluator 分離の live 端
    到達は確認済として扱ってよい」に基づき done とする。into:v0.0.5 の dangling carried を解消。

# ── BT-04: US-04 を S1 まで backtrack(seed の本質が「状態」でなく「即確認データ」)──
- id: BT-04-seed-for-immediate-verification
  origin: v0.0.5/s9 review (ユーザー指摘「ステップ戻って実装し直すべき / 最初から いろいろなステップを即確認するためのデータ作り と言っていた」)
  decision: >
    却下理由: US-04 を「phase 状態だけ seed + 検証は実 claude を走らせる(遅い hearing)」で実装したが、
    原意「いろいろなステップを即確認するためのデータ作り」から外れていた(S9 live で generator が
    hearing-first になり別 run 監査まで到達せず=即確認になっていない)。対応: US-04 を S1 まで backtrack
    し「seed = 任意 step を走らせずに即検証できるデータ(前段成果物+産物+証拠+状態)を生成」へ再定義、
    S5→S6→S7/S8→S9 を作り直す。制約として「seed は状態だけでなくデータまで作る / 即確認できる」を守る。
  state: done
  closed_in: >
    S1 再ヒアリング Q-01「軽い base + いろんな要件のサイクル群 / 各々別 step 停止 / 全サイクル実 run 相当の
    適切なデータ(プレースホルダ不可)」を確定し S5→S6→US-04 を再 flow。スイート 5 サイクルを
    fixtures/seed-cycles にコミット(todo-app@S2 / inventory@S4 / booking@S6 / expense@S8 / chat@S9 =
    別アプリ・別 step 停止・実 skill 出力形のもっともらしい本文 + 純粋 .ts コード + 実 run 相当ログ)。
    seedCycleCore に fixtureDir 複製モード + seedSuiteCore(project ごと seed)を追加。証拠 screenshot は
    seed-suite-capture で実 studio ボードを実キャプチャ(約 90KB/1440×900、1×1 placeholder を廃止)。
    seed:suite CLI 実機確認(5 サイクル / chat 3・expense 2 manifest)。
    tests/integration/seed-immediate-verify.test.ts(9 pass)で「seed → live AI 無しで chat@S9・expense@S8 が
    即 eligible / 実 screenshot >2KB / 産物は実コード・実本文」を実証。full suite 760 pass。
    限界(明記 / 非 descope): seed は対象アプリ画面そのものは撮らない(実 live run の captureVerifyUi の領域)=
    即確認の「機構」をもっともらしいデータ上で証明するもの(S5 unit-04 D-04)。

