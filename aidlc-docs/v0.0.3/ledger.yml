- id: S10-live-question-as-review
  origin: v0.0.3/s10-acceptance.md
  decision: "live run で実 Claude が(回答を要する)質問を投げているのに、question カードでなく visual_review(レビュー待ち)として Inbox に出る。headless `claude -p` は mid-run 停止せず、live adapter は成功時に常に ResultEmitted→visual_review を出すため、出力に含まれる質問が question 経路に乗らない。Human Inbox の魂(AI→人間の質問はカード化)が live で未成立。"
  state: carried
  into: v0.0.4   # 次サイクルで reconcile。実 AI E2E と同枠 / 既存 S8-Q02(v0.0.6, mid-run pause)とは別の「出力質問の経路」問題。

- id: S10-review-md-plaintext
  origin: v0.0.3/s10-acceptance.md
  decision: "レビュー画面(ReviewBlocks の summary block)が、実 Claude が返した Markdown 本文を**素のプレーンテキスト**で表示する(見出し/箇条書き/コードが崩れる)。`web/src/features/review/ReviewBlocks.tsx` summary case が body をそのまま <p> に流している。実 AI の成果物が読めるよう Markdown レンダリングが要る(原則③: 人間がコードを見ずに承認できる成果物)。"
  state: carried
  into: v0.0.4   # 次サイクルで reconcile。live を本物にしたら成果物本文が md になるため、描画の md 対応が必要に。

- id: S10-full-prior-artifact-context
  origin: v0.0.3/s10-acceptance.md
  decision: "US-03 で 3rd source=brief は注入したが、『前段の各ステップ成果物(S1→S2→…の連鎖 = aidlc-docs/{v}/sN/*)を実際に集めて AI に渡す』フル文脈注入は未配線。PromptComposer.contextPaths という受け口はある(既定 brief のみ)が、サイクル文脈に応じて前段成果物 path を解決して渡す呼び出し側(live.ts/engine)が無い。実 AI が前工程を踏まえた本物の成果物を出すには、これが本命の文脈。S10 で人間が指摘。"
  state: carried
  into: v0.0.4   # 次サイクルで reconcile。①-c live prompt 合成契約の完成形。contextPaths に前段成果物を載せる解決ロジックを app/engine 側に追加。

