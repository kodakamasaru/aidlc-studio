- id: S11-IMP1-live-evidence-hard-gate
  origin: v0.0.4/s11-retrospective.md   # S11 改善提案 #1(最優先 / P36 で真因是正後)
  decision: >
    真因(P36 / ユーザー指摘で是正)= 人間が初日から繰り返し「live で確認せよ」と明示指示し責務契約も
    焼き込み済みなのに、AI が毎回 live を S10 まで deferral した = 盲点でなく不遵守(compliance)。
    soft な指示・契約追加では行動が変わらないと本サイクルで実証(契約を焼いた直後に同じ逆転が再発)。
    対策は「契約/S9 にもう一文足す」でなく deferral を物理的に不能にする 3 点:
    (a) 機械ハードゲート = 各技術 step の done を「live 証拠アーティファクト(実 backend 縦経路ログ +
    配信 screenshot)の存在」で機械検証し、無ければ done 不可(自己申告でなく物理前提)。
    (b) live を安くする = seeded states + backend --watch + verify:shot/visual を毎 step 自動実行し
    deferral の経済的理由を消す。(c) per-step live = S10 を待たず各 step 完了時に当該 step の live 縦断を
    1本走らせ、人間が S10 で初めて live を踏む end-loaded 構造を解体する。
    注: 各 step に live 実行コストを課す運用変更は事業判断の要素を含むため S12 で人間に確認。
  lineage: >
    ★これは新規でなく再発: v0.0.3 S11 改善提案 #4 `S11-P04-evaluator-mechanical-gate`
    (確定前 evaluator を hook/CI で機械強制)が同じ機械ゲート思想。v0.0.3→v0.0.4 carried →
    v0.0.4 S1 D-01 で「インフラゆえ後回し」と v0.0.5 へ再 point → v0.0.4 はゲート無しで走り 22 バグ。
    本 IMP1 は1サイクル遅れの再発明(s11 P37/P38)。
  escalation: >
    ★3度目の defer 禁止(T41): 構造/インフラ改善は backlog だと毎回後回しされる(P38 実証)。
    v0.0.5 では本項目を **backlog でなく first-class US として commit** すること。
    同じ提案が2サイクル連続 carried = 自動 escalate(US 化必須)を改善提案制度に追加(T41/T42)。
  scope_v005: >
    ★ユーザー承認(2026-06-20)で IMP1 に以下を含める:
    (a) **ledger モデル再設計**: 現状は版数ごと `aidlc-docs/{vX}/ledger.yml` を「次サイクルが pull」する
    単一ホップ・soft 設計で、未解決提案が 1 サイクルごとに AI の視界から落ちる(P37 の機械的原因)。
    → **ルート単一 append-only 台帳** `aidlc-docs/ledger.yml`(brief.md と同じ全版共通)に変更し、
    未解決項目を版を跨いで常に保持。context-resolver Section 6 注入を「現サイクル + ルート台帳」にして
    **全サイクル横断が機械的に効く**ようにする。
    (b) **reconcile のコード化**: 現状 reconcile ゲートはテキスト規約のみでコード強制ゼロ。
    前(全)サイクルの未解決 + escalation 付き項目が次サイクルで US 化されていなければ S1 を fail させる
    script/hook を実装(live 証拠ハードゲートと同じ「テキスト→機械」転換)。
  state: carried
  into: v0.0.5
