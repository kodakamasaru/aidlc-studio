# v0.0.4 引き継ぎ台帳(ledger / 正本 = file)。
# 規約: D/確定項目に state: carried|done|dropped。carried は into: 必須、dropped は reason: 必須。
# 次サイクル S1 は前バージョン ledger の未 reconcile(carried で into が当該サイクル)をゼロにするまで進めない。
#
# ── 本サイクル内の手戻り(S8 実機レビューで発覚 / S8→S4 backtrack)──
# into: v0.0.4(自サイクル)= 「このサイクルを閉じる前に v0.0.4 内で消し込む義務」。
# 次サイクル(v0.0.5)の reconcile 対象ではない(into が v0.0.5 を指さないため)。
# S4 をやり直して S5→S8 までカスケード再実装し、消し込んだら done + closed_in に更新する。

- id: BT-01-context-io-design
  origin: v0.0.4/s8-integration.md   # S8 実機レビュー(2026-06-14)で人間が発覚
  decision: >
    US-01 前段文脈注入は「機構(前段 index.md のパス連結)」だけで、AIへの入力コンテキストと
    出力フォーマットの「設計」が無い。具体: ①コンテキストを DB(questions/answers・StepContracts・
    run/cycle 状態)から正規に読まずファイル(aidlc-docs)だけ参照 ②brief が S2 以降で落ちる疑い
    ③ユビキタス言語・決定(D-NN)・引き継ぎ ledger を設計コンテキストとして渡していない
    ④前段成果物が index 粒度のみ(詳細が要る工程に詳細が渡らない)⑤入出力が自由 md + 埋め込み
    block の best-effort parse で、質問など構造化出力を確実に受け取れない。
    発生源 = S4(技術仕様)が transport だけで「入力コンテキスト設計 + 出力フォーマット設計」を
    first-class 成果物にしなかったため。S5 Unit-02 も「機構」止まり。
  state: done
  closed_in: >
    2026-06-14 commit 163e8f4 + 後続。S4 §C7 で契約設計 → BU-2(aidlc-result 出力 protocol /
    wire 純関数 + live/scripted 受領 + status ルーティング)+ BU-1(構造化コンテキスト resolver:
    DB+docs+file から §C7.1 セクション列 / brief 常時 / 出力契約注入 / 粒度表 / 実 run パス配線)。505 green。

- id: BT-02-config-hearing-flow
  origin: v0.0.4/s8-integration.md   # S8 実機レビュー(2026-06-14)で人間が発覚(ヒアリング画面→サイクル画面 bounce)
  decision: >
    US-06「設定が個別フォームでなく AI ヒアリングで埋まる(2層: グローバル既定 + サイクル単位)」の
    機能フローが未配線。読み返し画面(scr-04)と会話スレッド器は実装済だが、①「会話で直す」が設定
    ヒアリング run を起動しない(cosmetic ラベルのみ)②回答→StepContracts 書き込み経路が backend に
    無い(設定書込は今も個別フォーム PATCH のみ=US-06 が廃止すべきもの)③グローバル「会話で直す」は
    存在しないルート /settings/thread へ飛び サイクル一覧へ bounce。
    発生源 = S4(機構未設計)+ S5(Unit 未分割)。S2 にも 2層モデルとの文言不整合(「ステップ着手で」)。
  state: done
  closed_in: >
    2026-06-14 commit 163e8f4 + 後続。§C7.6 書込機構 pin(構造化質問→直接書込 / target:{step,field})。
    BU-3 backend(hearing-service.applyHearingAnswerToContracts + wire/domain target + 回答ルーティング
    + scripted config-hearing)。BU-3 web: グローバル dead route(/settings/thread bounce)解消 →
    /settings/hearing 新設。cycle スコープ end-to-end。グローバルスコープも完成: 隠し system サイクル
    (__global_settings__ / 一覧から filter)を host に target.scope=global で回答→project.pipelineDef 書込。
    505 green / web build clean。US-06 グローバル+サイクル両層が機能。

- id: BT-03-recurrence-prevention
  origin: v0.0.4/s8-integration.md
  decision: >
    再発防止(道具では直らない層 / skill 本文 + operating-model に焼く)。
    ①S4: 技術仕様は「AIへの入力コンテキスト設計 + 出力フォーマット設計」を first-class 成果物として
    必須化(transport/機構だけで完了にしない)。②S8: 完全性ゲートを US-AC 機能フロー貫通で回す
    (画面 mock 一致は必要条件であって十分条件でない / 画面起点でなく US-AC インベントリ起点)。
  state: done
  closed_in: >
    2026-06-14 / kit/rules/aidlc-operating-model.md「再発防止ゲート(BT-03 恒久ルール)」に Rule A/B を
    DRY 定義 + kit/skills/aidlc-s4-tech-spec/SKILL.md 完了条件(7) + kit/skills/aidlc-s8-integration/SKILL.md
    完了条件(6)・進め方・US-AC 機能フロー突合表 を追記(各 skill は参照のみ)。
