- id: AUTO-ORCH-durable-self-healing
  origin: v0.0.4/s10-acceptance.md   # S10 中の設計対話(2026-06-19)で確定
  decision: >
    プロダクト最終構想「放置可能な自走基盤」の設計を確定。タスクを積めば最大並列 N を超えない範囲で
    human-gate 手前まで自走し、claude セッション上限/アプリ再起動/クラッシュでも不整合なく自己復帰、
    技術的失敗は人間に出さず仕組み内で retry。中核方針: ①プロセス使い捨て/DB が唯一の真実/起動毎 reconcile/
    遷移は冪等 ②人間の介在点は固定4つ(要件/画面/レビュー/改善)以外に増やさない ③各技術 step は
    generate→独立検証→自動 retry(claude に自己採点させない)④上限/レートは backoff-retriable に分類して自動再開
    ⑤retry 上限到達は inbox に積む + スケジューラは後続タスクへ(非ブロッキング)⑥claude の不確実性は1試行に
    隔離し done は観測事実で裏取り。設計仕様の正本 = aidlc-docs/v0.0.5/autonomous-self-healing-orchestration.md。
  state: carried
  into: v0.0.5
  reason: >
    v0.0.4 の US-01〜08(Human Inbox 縦ループ)の範囲外。自走スケジューラ(N並列+DAG+parking)/上限 backoff/
    逐次 stream 監視 + live-run 永続台帳/late-emit 冪等化/独立検証→自動 retry 配線 が未実装(ギャップ表は設計仕様 §11)。
    既存の土台(reconcile・session_id 永続・evaluator/deterministic-gate/visual-eval)を活かして v0.0.5 で構築。
    [O3-live-resume-continuation-unproven] はこの自走基盤の resume 経路に内包して実証する。

