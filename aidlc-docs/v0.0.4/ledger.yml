- id: S11-process-problems-pointer
  origin: v0.0.4/s9-validation.md   # S9 進行中(2026-06-14)にユーザー指摘 + AI 自己分析
  decision: >
    AI 開発部の進め方に重大なプロセス問題が判明(P1〜P9)。根本原因 = 着手時に最上位の正本
    responsibility-contract(US+mock 最上位 / human=ダブルチェック / human-gate のみ停止)と S1–S3 の
    US/mock 意図を読まず、「テストが緑・完成して見える」を「事業部の正解に一致」より優先した。
    具体 = ①human=ダブルチェックの未認識 ②US/mock を勝手に descope ③S1–S3 の想定未把握
    ④正本未読 ⑤mock 注入で未実装能力を糊塗 ⑥産物起点で網羅漏れ ⑦worker の緑を未検証で外注
    ⑧機能実証を主成果にし mock 突合を後回し ⑨手戻り判定の不一致。
  state: carried
  into: v0.0.4/s11-retrospective.md   # 本サイクルの S11 で必ず Problem/Try として根本原因分析する
  reason: >
    詳細・Problem 表・Try(再発防止 T1〜T5)は aidlc-docs/v0.0.4/s11-retrospective.md の
    「先取りプロセス問題メモ」に記録済。S11 はこのファイルを最優先で取り込み分析すること。
    メモリ機構は信用しない方針のため、決定論的に必ず読まれる場所(S11 出力ファイル + 本台帳)に二重化。

- id: F3-project-management-ui
  origin: v0.0.4/s10-acceptance.md   # S10 実機レビュー(2026-06-14)で発見
  decision: >
    web に**プロジェクト作成/リセット/切替の UI が無い**(project-context が projects[0] 固定)。
    一度プロジェクトが登録されると画面から作り直せず、legacy プロジェクト(step-model-v2 前 / S2.5 入り)が
    残ると 12 工程にならない問題が表面化。本サイクルでは legacy データを DB から削除して unblock した
    (backup: aidlc-studio.db.bak-manual / 一時 script: scripts/cleanup-legacy-project.ts)。
  state: carried
  into: v0.0.5
  reason: >
    プロジェクト管理 UI(作成/リセット/切替)は v0.0.4 の US-01〜08(S1 会話ループ)の範囲外 = baseline 機能。
    ここで実装するのは scope creep のため次サイクルへ。併せて legacy データのマイグレーション方針も検討
    (非 canonical legacy ID の正規化 / 安全なマッピング)。一時 cleanup script + backup は housekeeping で整理。
